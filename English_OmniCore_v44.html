<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TITAN OS v44: OVERCLOCK EDITION</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        /* =============================================================================
           CORE DESIGN SYSTEM: THEME ENGINE & PREMIUM TYPOGRAPHY (v39.3 LOCKED)
           ============================================================================= */
        :root {
            --bg-color: #ffffff; --card-bg: #ffffff; --sidebar-bg: #f8f9fa; --border-color: #dee2e6;
            --primary: #007bff; --secondary: #6f42c1; --danger: #dc3545; --profit: #28a745; --warning: #fd7e14;
            --text-main: #212529; --text-dim: #6c757d; --text-invert: #ffffff;
            --shadow: 0 8px 24px rgba(0,0,0,0.08);
            --font-en: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            --font-cn: "Microsoft JhengHei", "Noto Sans TC", sans-serif;
        }
        [data-theme="dark"] {
            --bg-color: #0d1117; --card-bg: #161b22; --sidebar-bg: #010409; --border-color: #30363d;
            --primary: #58a6ff; --profit: #3fb950; --danger: #f85149; --warning: #d29922;
            --text-main: #c9d1d9; --text-dim: #8b949e; --text-invert: #0d1117;
            --shadow: 0 15px 40px rgba(0,0,0,0.6);
        }

        * { box-sizing: border-box; user-select: none; outline: none; transition: background-color 0.3s, border-color 0.3s, color 0.3s; }
        body { margin: 0; width: 100vw; height: 100vh; background-color: var(--bg-color); color: var(--text-main); font-family: var(--font-en); overflow: hidden; display: flex; flex-direction: column; }

        header { height: 70px; flex-shrink: 0; z-index: 100; background: var(--bg-color); border-bottom: 1px solid var(--border-color); display: flex; justify-content: space-between; align-items: center; padding: 0 35px; }
        .brand { font-size: 1.4rem; font-weight: 800; letter-spacing: 1px; display: flex; align-items: center; gap: 15px; }
        .brand span { font-weight: 400; color: var(--text-dim); }
        .toggles { display: flex; gap: 10px; }
        .btn-toggle { background: transparent; border: 1px solid var(--border-color); color: var(--text-main); padding: 5px 10px; border-radius: 6px; cursor: pointer; font-weight: bold; font-family: Consolas, monospace; }
        .btn-toggle:hover { background: var(--border-color); }
        .header-right { display: flex; gap: 25px; align-items: center; font-family: Consolas, monospace; }
        .metric { display: flex; flex-direction: column; align-items: flex-end; }
        .metric-label { font-size: 0.7rem; color: var(--text-dim); letter-spacing: 1px; }
        .metric-val { font-size: 1.2rem; font-weight: 700; color: var(--text-main); }
        .val-profit { color: var(--profit); }

        #workspace { flex: 1; display: flex; overflow: hidden; }
        .sidebar { width: 260px; background: var(--sidebar-bg); border-right: 1px solid var(--border-color); display: flex; flex-direction: column; padding: 20px 10px; gap: 4px; overflow-y: auto; }
        .nav-label { font-size: 0.75rem; color: var(--text-dim); margin-top: 20px; margin-bottom: 8px; padding-left: 15px; font-weight: bold; letter-spacing: 1px; }
        .nav-item { padding: 12px 15px; cursor: pointer; border-radius: 6px; color: var(--text-dim); font-weight: 600; display: flex; align-items: center; gap: 12px; font-size: 0.95rem; font-family: Consolas, monospace; }
        .nav-item:hover { background: var(--border-color); color: var(--text-main); }
        .nav-item.active { background-color: var(--card-bg); color: var(--primary); border: 1px solid var(--border-color); box-shadow: var(--shadow); }
        .nav-item span { font-family: var(--font-en); }
        .active-unit-indicator { font-size: 0.7rem; color: var(--profit); margin-left: 15px; font-weight: bold; letter-spacing: 1px; margin-top: -5px; margin-bottom: 10px; }

        .stage { flex: 1; height: 100%; overflow-y: auto; display: flex; flex-direction: column; align-items: center; padding: 40px; padding-bottom: 200px; }
        .stage::-webkit-scrollbar { width: 8px; }
        .stage::-webkit-scrollbar-thumb { background: var(--border-color); border-radius: 4px; }

        /* DASHBOARD & UNIT HUB */
        .dash-grid { width: 100%; max-width: 900px; display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 30px; }
        .dash-card { background: var(--card-bg); border: 1px solid var(--border-color); padding: 25px; border-radius: 12px; text-align: center; box-shadow: var(--shadow); }
        .dash-title { font-size: 0.85rem; color: var(--text-dim); margin-bottom: 8px; font-weight: bold; text-transform: uppercase; }
        .dash-num { font-size: 2.5rem; font-family: Consolas, monospace; color: var(--text-main); font-weight: 700; }
        .config-bar { width: 100%; max-width: 900px; display: flex; gap: 15px; margin-bottom: 30px; }
        .btn-action { padding: 10px 20px; background: var(--card-bg); border: 1px solid var(--border-color); color: var(--text-main); border-radius: 6px; cursor: pointer; font-weight: bold; display: flex; align-items: center; gap: 8px; }
        .btn-action:hover { border-color: var(--primary); color: var(--primary); }
        
        .unit-list { width: 100%; max-width: 900px; display: flex; flex-direction: column; gap: 15px; }
        .unit-row { background: var(--card-bg); border: 1px solid var(--border-color); border-radius: 12px; padding: 20px 25px; display: flex; justify-content: space-between; align-items: center; box-shadow: var(--shadow); border-left: 6px solid var(--primary); }
        .unit-row.status-new { border-left-color: var(--primary); }
        .unit-row.status-weak { border-left-color: var(--warning); }
        .unit-row.status-stable { border-left-color: var(--profit); }
        .unit-row.status-toxic { border-left-color: var(--danger); background: rgba(220,53,69,0.05); }
        .unit-row.is-active { border: 2px solid var(--primary); border-left: 6px solid var(--primary); background: var(--sidebar-bg); }
        .unit-info h4 { margin: 0 0 8px 0; color: var(--text-main); font-size: 1.2rem; font-family: var(--font-en); }
        .unit-stats { font-size: 0.85rem; color: var(--text-dim); font-family: Consolas, monospace; display: flex; gap: 15px; }

        /* STUDY CARDS */
        .study-card { 
            width: 100%; max-width: 800px; min-height: 480px; height: auto; 
            background: var(--card-bg); border: 1px solid var(--border-color); 
            box-shadow: var(--shadow); border-radius: 16px; 
            padding: 50px; display: flex; flex-direction: column; align-items: center; justify-content: center;
            position: relative; gap: 15px; 
        }
        
        .word-unit { font-size: 0.85rem; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1px; border: 1px solid var(--border-color); padding: 4px 10px; border-radius: 12px; }
        
        /* 🗣️ VOX ENGINE HOVER EFFECT */
        .word-en { font-size: 4rem; font-weight: 800; color: var(--text-main); margin: 0; letter-spacing: -1px; text-align: center; cursor: pointer; position: relative; }
        .word-en:hover { color: var(--primary); }
        .word-en:hover::after { content: '🔊'; font-size: 1.5rem; position: absolute; top: -10px; right: -30px; }
        
        .ipa-txt { color: var(--text-dim); font-size: 1.3rem; font-family: Consolas, monospace; }

        /* PROMPT BOX & TIMER */
        .prompt-box {
            width: 100%; background: var(--sidebar-bg); padding: 35px 25px 25px 25px; 
            border-radius: 12px; border-left: 5px solid var(--primary); border-top: none; 
            position: relative; margin-top: 10px; overflow: hidden;
            display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; 
        }
        
        /* ⏱️ OVERCLOCK TIMER CSS */
        .timer-line {
            height: 4px; background: var(--primary); width: 100%;
            position: absolute; top: 0; left: 0;
            animation: countdown 5s linear forwards;
        }
        @keyframes countdown { 
            0% { width: 100%; background: var(--primary); } 
            70% { background: var(--warning); }
            100% { width: 0%; background: var(--danger); } 
        }

        .prompt-content { font-size: 1.6rem; font-style: italic; color: var(--text-main); line-height: 1.6; font-family: var(--font-en); font-weight: 500; width: 100%; text-align: center; }
        .prompt-cn { font-size: 1.8rem; font-weight: bold; color: var(--text-main); font-family: var(--font-cn); font-style: normal; width: 100%; text-align: center; letter-spacing: 1px; }
        .toggle-lang-btn { position: absolute; top: 10px; right: 10px; background: var(--card-bg); border: 1px solid var(--border-color); color: var(--text-dim); padding: 4px 10px; border-radius: 6px; cursor: pointer; font-size: 0.8rem; font-weight: bold; box-shadow: 0 2px 5px rgba(0,0,0,0.05); z-index: 10; }
        .toggle-lang-btn:hover { background: var(--primary); color: #fff; border-color: var(--primary); }

        /* PREMIUM THIN INPUT */
        .input-bar { 
            width: 100%; padding: 20px; background: var(--bg-color); border: 2px solid var(--border-color); 
            color: var(--text-main); font-size: 2.2rem; font-weight: 300; text-align: center; 
            border-radius: 12px; font-family: var(--font-en); letter-spacing: 2px;
        }
        .input-bar::placeholder { color: var(--text-dim); font-size: 1.2rem; font-weight: 400; letter-spacing: 0; }
        .input-bar:focus { border-color: var(--primary); box-shadow: 0 0 20px rgba(0, 123, 255, 0.15); }

        .sys-btn { padding: 12px 30px; font-size: 0.95rem; font-weight: bold; color: var(--primary); background: transparent; border: 2px solid var(--primary); border-radius: 6px; cursor: pointer; text-transform: uppercase; }
        .sys-btn:hover { background: var(--primary); color: var(--text-invert); }
        .fb-msg { font-weight: bold; font-size: 1rem; color: var(--text-dim); font-family: Consolas, monospace; }
        
        .quiz-header { width: 100%; display: flex; justify-content: space-between; color: var(--text-dim); font-weight: bold; border-bottom: 1px solid var(--border-color); padding-bottom: 10px; }
        .quiz-question { font-size: 1.4rem; width: 100%; text-align: center; line-height: 1.5; font-family: var(--font-en); font-weight: 600; }
        .quiz-options { width: 100%; display: flex; flex-direction: column; gap: 12px; }
        .quiz-opt-btn { width: 100%; text-align: left; padding: 16px 20px; font-size: 1.2rem; background: var(--card-bg); border: 1px solid var(--border-color); color: var(--text-main); border-radius: 10px; cursor: pointer; display: flex; align-items: center; gap: 15px; }
        .quiz-opt-btn:hover { border-color: var(--primary); background: var(--sidebar-bg); }
        .opt-label { font-weight: bold; color: var(--text-dim); border: 1px solid var(--border-color); border-radius: 50%; width: 30px; height: 30px; display: flex; align-items: center; justify-content: center; font-size: 1rem; flex-shrink: 0; }

        .hidden { display: none !important; }
    </style>
</head>
<body>

    <header>
        <div class="brand">
            OMNI-CORE <span>v44.0 OVERCLOCK</span>
            <div class="toggles">
                <button class="btn-toggle" onclick="Theme.toggle()">🌓</button>
                <button class="btn-toggle" onclick="I18n.toggle()" id="lang-btn">EN/中</button>
            </div>
        </div>
        <div class="header-right">
            <div class="metric">
                <span class="metric-label" data-i18n="hdr_winrate">WIN RATE</span>
                <span class="metric-val" id="winrate-val">0%</span>
            </div>
            <div class="metric">
                <span class="metric-label" data-i18n="hdr_capital">CAPITAL</span>
                <span class="metric-val val-profit" id="capital-val">$10,000.00</span>
            </div>
        </div>
    </header>

    <div id="workspace">
        <nav class="sidebar">
            <div class="nav-label" data-i18n="nav_grp_sys">SYSTEM</div>
            <div class="nav-item active" onclick="App.route('dashboard', this)">// <span data-i18n="nav_dash">DASHBOARD</span></div>
            <div class="nav-item" onclick="App.route('units', this)">// <span data-i18n="nav_units">UNIT HUB</span></div>
            <div class="active-unit-indicator" id="target-indicator">TARGET: ALL UNITS</div>
            
            <div class="nav-label" data-i18n="nav_grp_rev">REVIEW ZONE</div>
            <div class="nav-item" onclick="App.route('quiz', this)" style="color:var(--primary);">// <span data-i18n="nav_quiz">DAILY CALIBRATE</span></div>
            <div class="nav-item" onclick="App.route('flashcard', this)">// <span data-i18n="nav_flash">SRS FLASHCARD</span></div>
            
            <div class="nav-label" data-i18n="nav_grp_prac">PRACTICE ZONE</div>
            <div class="nav-item" onclick="App.route('ch_to_en', this)">// <span data-i18n="nav_spell">SPELLING DECODER</span></div>
            <div class="nav-item" onclick="App.route('fill', this)">// <span data-i18n="nav_fill">MARGIN PATCH</span></div>
            <div class="nav-item" onclick="App.route('sentence', this)">// <span data-i18n="nav_syntax">SYNTAX FORGE</span></div>
        </nav>

        <section class="stage" id="root-view"></section>
    </div>

    <input type="file" id="file-importer" accept=".json" class="hidden" onchange="Engine.importJSON(event)">

    <script>
        const I18n = {
            lang: 'en',
            dict: {
                en: {
                    hdr_winrate: "WIN RATE", hdr_capital: "CAPITAL",
                    nav_grp_sys: "SYSTEM", nav_dash: "DASHBOARD", nav_units: "UNIT HUB",
                    nav_grp_rev: "REVIEW ZONE", nav_quiz: "DAILY CALIBRATE", nav_flash: "SRS FLASHCARD",
                    nav_grp_prac: "PRACTICE ZONE", nav_spell: "SPELLING DECODER", nav_fill: "MARGIN PATCH", nav_syntax: "SYNTAX FORGE",
                    btn_import: "📥 IMPORT JSON", btn_export: "💾 EXPORT BACKUP", btn_purge: "🗑️ PURGE DATA",
                    dash_total: "TOTAL WORDS", dash_due: "DUE TODAY", dash_retained: "RETAINED",
                    dash_mastery: "MASTERY %", dash_execs: "TOTAL EXECUTIONS", dash_streak: "CURRENT STREAK",
                    btn_reveal: "REVEAL", btn_forgot: "FORGOT", btn_remember: "REMEMBERED", btn_execute: "EXECUTE",
                    ph_spell: "Input English...", ph_fill: "Fill missing data...", ph_syntax: "Re-type Syntax...",
                    msg_all_clear: "TASK COMPLETE", msg_no_need: "No due words in target unit. Select a different unit in UNIT HUB.",
                    lbl_question: "Question", lbl_uncat: "Uncategorized",
                    lbl_all_units: "ALL UNITS", btn_engage: "ENGAGE", btn_disengage: "DISENGAGE"
                },
                zh: {
                    hdr_winrate: "當前勝率", hdr_capital: "可用資金",
                    nav_grp_sys: "系統 (SYSTEM)", nav_dash: "統計儀表板", nav_units: "單元中樞",
                    nav_grp_rev: "複習區 (REVIEW ZONE)", nav_quiz: "每日校準測驗", nav_flash: "間隔記憶字卡",
                    nav_grp_prac: "練習區 (PRACTICE ZONE)", nav_spell: "拼寫解碼", nav_fill: "克漏字填空", nav_syntax: "語法鍛造 (造句)",
                    btn_import: "📥 匯入 JSON", btn_export: "💾 匯出備份 (BACKUP)", btn_purge: "🗑️ 清空所有資料",
                    dash_total: "總學習字數", dash_due: "今日待複習", dash_retained: "已保留記憶",
                    dash_mastery: "整體掌握度", dash_execs: "總交易次數", dash_streak: "連續獲利",
                    btn_reveal: "顯示答案", btn_forgot: "忘記了", btn_remember: "記得了", btn_execute: "執行送出",
                    ph_spell: "輸入對應的英文單字...", ph_fill: "填入句子中遺失的單字...", ph_syntax: "重新輸入整句文法...",
                    msg_all_clear: "任務完成", msg_no_need: "目標單元目前無須複習，請至「單元中樞」切換單元。",
                    lbl_question: "題目", lbl_uncat: "未分類單元",
                    lbl_all_units: "全庫測驗", btn_engage: "鎖定目標", btn_disengage: "解除鎖定"
                }
            },
            init: function() { this.lang = localStorage.getItem('titan_lang') || 'en'; this.apply(); },
            toggle: function() { this.lang = this.lang === 'en' ? 'zh' : 'en'; localStorage.setItem('titan_lang', this.lang); this.apply(); App.render(); },
            t: function(key) { return this.dict[this.lang][key] || key; },
            apply: function() { document.querySelectorAll('[data-i18n]').forEach(el => { const key = el.getAttribute('data-i18n'); if(this.dict[this.lang][key]) el.innerHTML = this.dict[this.lang][key]; }); }
        };

        const Theme = {
            init: function() { const saved = localStorage.getItem('titan_theme') || 'dark'; document.documentElement.setAttribute('data-theme', saved); },
            toggle: function() {
                const current = document.documentElement.getAttribute('data-theme');
                const next = current === 'dark' ? 'light' : 'dark';
                document.documentElement.setAttribute('data-theme', next); localStorage.setItem('titan_theme', next);
            }
        };
        
        const Engine = {
            db: [], capital: 0, stats: {},
            init: function() {
                this.db = JSON.parse(localStorage.getItem('titan_v44_db')) || [];
                const now = Date.now();
                this.db.forEach(w => { 
                    if(!w.dateAdded) w.dateAdded = now; 
                    if(!w.failCount) w.failCount = 0; 
                });
                this.capital = parseFloat(localStorage.getItem('titan_v44_cap')) || 10000.00;
                this.stats = JSON.parse(localStorage.getItem('titan_v44_stats')) || { totalPlays: 0, wins: 0, streak: 0 };
                this.updateHeader();
            },
            saveAll: function() {
                localStorage.setItem('titan_v44_db', JSON.stringify(this.db));
                localStorage.setItem('titan_v44_cap', this.capital.toFixed(2));
                localStorage.setItem('titan_v44_stats', JSON.stringify(this.stats));
            },
            recordTrade: function(isWin) {
                this.stats.totalPlays++;
                if(isWin) { this.stats.wins++; this.stats.streak++; this.capital += (50 + this.stats.streak * 5); } 
                else { this.stats.streak = 0; this.capital -= 150; }
                this.saveAll(); this.updateHeader();
            },
            updateHeader: function() {
                document.getElementById('capital-val').innerText = `$${this.capital.toFixed(2)}`;
                let rate = this.stats.totalPlays === 0 ? 0 : (this.stats.wins / this.stats.totalPlays) * 100;
                document.getElementById('winrate-val').innerText = `${rate.toFixed(1)}%`;
            },
            processSRS: function(wordStr, isWin) {
                let item = this.db.find(x => x.w === wordStr);
                if(!item) return;
                
                if(typeof item.failCount === 'undefined') item.failCount = 0;

                if(isWin) {
                    item.reviewCount = (item.reviewCount || 0) + 1;
                    if(item.interval === 0) item.interval = 1; else if(item.interval === 1) item.interval = 3; else item.interval = Math.round(item.interval * item.ease);
                    item.ease = Math.min(3.0, item.ease + 0.1);
                    item.failCount = Math.max(0, item.failCount - 1); // 減少毒性
                } else {
                    item.interval = 0; item.ease = Math.max(1.3, item.ease - 0.2); 
                    item.reviewCount = Math.max(0, (item.reviewCount || 0) - 1);
                    item.failCount++; // 增加毒性
                }
                
                // ☢️ 毒性資產判定機制 (連續錯3次以上)
                item.isToxic = item.failCount >= 3;
                item.nextDate = Date.now() + (item.interval * 86400000);
                this.saveAll();
            },
            getDueWords: function(unitFilter = 'ALL') { 
                const now = Date.now(); 
                if(unitFilter === 'TOXIC') return this.db.filter(w => w.isToxic && w.nextDate <= now);
                let source = this.db;
                if(unitFilter !== 'ALL') source = source.filter(w => (w.category || I18n.t('lbl_uncat')) === unitFilter);
                return source.filter(x => x.nextDate <= now); 
            },
            triggerImport: function() { document.getElementById('file-importer').click(); },
            exportBackup: function() {
                const payload = { titan_version: "44.0", timestamp: Date.now(), db: this.db, capital: this.capital, stats: this.stats };
                const blob = new Blob([JSON.stringify(payload, null, 2)], {type: "application/json"});
                const a = document.createElement("a"); a.href = URL.createObjectURL(blob);
                a.download = `TITAN_BACKUP_${new Date().toISOString().slice(0,10)}.json`; a.click();
            },
            importJSON: function(event) {
                const file = event.target.files[0]; if(!file) return;
                const reader = new FileReader();
                reader.onload = (e) => {
                    try {
                        const importedData = JSON.parse(e.target.result);
                        // 判斷是否為 TITAN Backup 檔
                        if(importedData.titan_version && importedData.db) {
                            this.db = importedData.db; this.capital = importedData.capital || 10000; this.stats = importedData.stats || { totalPlays: 0, wins: 0, streak: 0 };
                            this.saveAll(); this.updateHeader(); alert("備份恢復成功！(Backup Restored)");
                            App.route('dashboard', document.querySelector('.nav-item')); return;
                        }
                        // 一般爬蟲匯入
                        let parsedDB = []; const now = Date.now();
                        for (let categoryName in importedData) {
                            importedData[categoryName].forEach(wordObj => {
                                parsedDB.push({ ...wordObj, category: categoryName, interval: 0, ease: 2.5, reviewCount: 0, failCount: 0, isToxic: false, nextDate: now, dateAdded: now });
                            });
                        }
                        this.db = this.db.concat(parsedDB).filter((v,i,a)=>a.findIndex(t=>(t.w === v.w))===i);
                        this.saveAll(); alert(`Imported ${parsedDB.length} items!`); App.route('units', document.querySelectorAll('.nav-item')[1]);
                    } catch (err) { alert("JSON format error."); }
                };
                reader.readAsText(file); event.target.value = '';
            },
            purgeDatabase: function() { if(confirm("Warning: This will delete all data. Continue?")) { this.db = []; this.saveAll(); App.route('dashboard', document.querySelector('.nav-item')); } }
        };

        window.togglePrompt = function(mode) {
            if (mode === 'flashcard') {
                const dt = document.getElementById('prompt-dt'); const d = document.getElementById('prompt-d'); const s = document.getElementById('prompt-s');
                if (!dt.classList.contains('hidden')) { dt.classList.add('hidden'); d.classList.remove('hidden'); }
                else if (!d.classList.contains('hidden')) { d.classList.add('hidden'); s.classList.remove('hidden'); }
                else { s.classList.add('hidden'); dt.classList.remove('hidden'); }
            } else if (mode === 'spelling') {
                const dt = document.getElementById('prompt-dt'); const d = document.getElementById('prompt-d');
                if (!dt.classList.contains('hidden')) { dt.classList.add('hidden'); d.classList.remove('hidden'); } else { d.classList.add('hidden'); dt.classList.remove('hidden'); }
            } else {
                const en = document.getElementById('prompt-en'); const dt = document.getElementById('prompt-dt');
                if (!en.classList.contains('hidden')) { en.classList.add('hidden'); dt.classList.remove('hidden'); } else { dt.classList.add('hidden'); en.classList.remove('hidden'); }
            }
        };

        const App = {
            mode: 'dashboard', playQueue: [], idx: 0, activeFilter: 'ALL', timerRef: null,
            init: function() { Theme.init(); I18n.init(); Engine.init(); this.route('dashboard', document.querySelector('.nav-item.active')); },
            
            // 🗣️ VOX ENGINE
            speak: function(text) {
                if(!('speechSynthesis' in window)) return;
                window.speechSynthesis.cancel();
                let u = new SpeechSynthesisUtterance(text);
                u.lang = 'en-US'; u.rate = 0.9;
                window.speechSynthesis.speak(u);
            },

            setFilter: function(unitName) {
                this.activeFilter = unitName;
                document.getElementById('target-indicator').innerText = `TARGET: ${unitName === 'ALL' ? I18n.t('lbl_all_units') : unitName}`;
                this.route('units', document.querySelectorAll('.nav-item')[1]);
            },

            route: function(mode, btnEl) {
                this.mode = mode;
                clearTimeout(this.timerRef); // Clear any pending Syntax Forge timers
                document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
                if(btnEl) btnEl.classList.add('active');

                if(['quiz', 'flashcard', 'ch_to_en', 'fill', 'sentence'].includes(mode)) {
                    let due = Engine.getDueWords(this.activeFilter);
                    if(due.length === 0 && this.activeFilter !== 'ALL' && this.activeFilter !== 'TOXIC') {
                        let unlearned = Engine.db.filter(w => (w.category === this.activeFilter) && (!w.reviewCount || w.reviewCount === 0));
                        due = unlearned;
                    }
                    if(mode === 'quiz') {
                        let randoms = Engine.db.filter(x => !due.includes(x)).sort(() => 0.5 - Math.random()).slice(0, 5);
                        this.playQueue = [...due, ...randoms].sort(() => 0.5 - Math.random()).slice(0, 15);
                    } else {
                        this.playQueue = [...due].sort(() => 0.5 - Math.random());
                    }
                    this.idx = 0;
                }
                this.render();
            },

            render: function() {
                const root = document.getElementById('root-view'); root.innerHTML = ''; 

                if (this.mode === 'dashboard') { this.renderDashboard(root); return; }
                if (this.mode === 'units') { this.renderUnitHub(root); return; }

                if (this.playQueue.length === 0) {
                    root.innerHTML = `<div class="study-card"><h2 style="color:var(--profit); font-size:2.5rem; margin:0;">${I18n.t('msg_all_clear')}</h2><p style="color:var(--text-dim); font-size:1.2rem;">${I18n.t('msg_no_need')}</p></div>`;
                    return;
                }

                const data = this.playQueue[this.idx];
                const card = document.createElement('div'); card.className = 'study-card';
                const catStr = data.category || I18n.t('lbl_uncat');
                const display_dt = data.dt && data.dt !== "N/A" ? data.dt : "No Chinese Data";
                const display_d  = data.d && data.d !== "N/A" ? data.d : "No Definition Data";

                if (this.mode === 'quiz') {
                    let options = [data];
                    let distractors = Engine.db.filter(x => x.w !== data.w).sort(() => 0.5 - Math.random()).slice(0, 3);
                    options = [...options, ...distractors].sort(() => 0.5 - Math.random());
                    let labels = ['A', 'B', 'C', 'D'];
                    let maskedSentence = data.s.replace(new RegExp(data.w, 'gi'), '________');
                    let optsHtml = options.map((opt, i) => `
                        <button class="quiz-opt-btn" onclick="App.checkQuiz('${opt.w}', '${data.w}')"><div class="opt-label">${labels[i]}</div> <span style="font-weight:700;">${opt.w}</span></button>
                    `).join('');
                    card.innerHTML = `<div class="quiz-header"><span>${I18n.t('lbl_question')} ${this.idx + 1} / ${this.playQueue.length}</span><span>${catStr}</span></div>
                        <div class="quiz-question">${maskedSentence} <br><span style="color:var(--text-dim); font-size:1.1rem; margin-top:10px; display:block; text-align:center;">(${display_dt})</span></div>
                        <div class="quiz-options">${optsHtml}</div>`;
                } 
                else if (this.mode === 'flashcard') {
                    // 🗣️ VOX ENGINE in Flashcard
                    card.innerHTML = `
                        <div class="word-unit">${catStr}</div>
                        <div class="word-en" onclick="App.speak('${data.w.replace(/'/g,"\\'")}')" title="Click to pronounce">${data.w}</div>
                        <div class="ipa-txt">${data.i}</div>
                        <div id="ans" class="hidden" style="width:100%;">
                            <div class="prompt-box">
                                <button class="toggle-lang-btn" onclick="togglePrompt('flashcard')">A / 中</button>
                                <div id="prompt-dt" class="prompt-cn">${display_dt}</div>
                                <div id="prompt-d" class="prompt-content hidden">${display_d}</div>
                                <div id="prompt-s" class="prompt-content hidden">"${data.s}"</div>
                            </div>
                        </div>
                        <div style="display:flex; gap:15px; margin-top:30px;">
                            <button class="sys-btn" onclick="document.getElementById('ans').classList.remove('hidden')">${I18n.t('btn_reveal')}</button>
                            <button class="sys-btn" style="border-color:var(--danger); color:var(--danger);" onclick="App.processTrade('${data.w}', false)">${I18n.t('btn_forgot')}</button>
                            <button class="sys-btn" style="border-color:var(--profit); color:var(--profit);" onclick="App.processTrade('${data.w}', true)">${I18n.t('btn_remember')}</button>
                        </div>`;
                } else {
                    let qHtml = "", ph = ""; let maskedEn = data.s.replace(new RegExp(data.w, 'gi'), '_____');
                    let timerHtml = ""; // ⏱️ OVERCLOCK TIMER
                    
                    if(this.mode === 'ch_to_en') { 
                        qHtml = `<div class="prompt-box"><button class="toggle-lang-btn" onclick="togglePrompt('spelling')">A / 中</button><div id="prompt-dt" class="prompt-cn">${display_dt}</div><div id="prompt-d" class="prompt-content hidden">${display_d}</div></div>`; ph = I18n.t('ph_spell'); 
                    }
                    else if(this.mode === 'fill') { 
                        qHtml = `<div class="prompt-box"><button class="toggle-lang-btn" onclick="togglePrompt('fill')">A / 中</button><div id="prompt-en" class="prompt-content">${maskedEn}</div><div id="prompt-dt" class="prompt-cn hidden">${display_dt}</div></div>`; ph = I18n.t('ph_fill'); 
                    }
                    else if(this.mode === 'sentence') { 
                        // Inject Timer Line for Syntax Forge
                        timerHtml = `<div class="timer-line"></div>`;
                        qHtml = `<div class="prompt-box">${timerHtml}<button class="toggle-lang-btn" onclick="togglePrompt('sentence')">A / 中</button><div id="prompt-en" class="prompt-content">${data.s}</div><div id="prompt-dt" class="prompt-cn hidden">${display_dt}</div></div>`; ph = I18n.t('ph_syntax'); 
                    }

                    card.innerHTML = `
                        <div class="word-unit">${catStr}</div>${qHtml}
                        <input type="text" id="inp" class="input-bar" placeholder="${ph}" autocomplete="off">
                        <button class="sys-btn" style="margin-top:20px;" onclick="App.checkInput('${data.w}', '${data.s.replace(/'/g,"\\'")}')">${I18n.t('btn_execute')}</button>
                    `;
                }
                
                root.appendChild(card);
                
                // ⏱️ SYNTAX FORGE TIMEOUT LOGIC
                if(this.mode === 'sentence') {
                    this.timerRef = setTimeout(() => {
                        const p_en = document.getElementById('prompt-en');
                        if(p_en && this.mode === 'sentence') {
                            p_en.innerText = "[ ENCRYPTED - RECALL FROM MEMORY ]";
                            p_en.style.color = "var(--danger)";
                            p_en.style.fontWeight = "800";
                            p_en.style.letterSpacing = "2px";
                        }
                    }, 5000);
                }

                if(document.getElementById('inp')) { document.getElementById('inp').focus(); document.getElementById('inp').onkeypress = (e) => { if(e.key==='Enter') App.checkInput(data.w, data.s); }; }
            },

            renderDashboard: function(root) {
                const total = Engine.db.length; const due = Engine.getDueWords('ALL').length; const retained = total - due;
                let mastery = total === 0 ? 0 : (retained / total) * 100;
                let html = `
                    <div class="config-bar">
                        <div style="display:flex; gap:10px;">
                            <button class="btn-action" onclick="Engine.triggerImport()">${I18n.t('btn_import')}</button>
                            <button class="btn-action" style="border-color:var(--profit); color:var(--profit);" onclick="Engine.exportBackup()">${I18n.t('btn_export')}</button>
                        </div>
                        <button class="btn-action" style="color:var(--danger); border-color:var(--danger);" onclick="Engine.purgeDatabase()">${I18n.t('btn_purge')}</button>
                    </div>
                    <div class="dash-grid">
                        <div class="dash-card"><div class="dash-title">${I18n.t('dash_total')}</div><div class="dash-num">${total}</div></div>
                        <div class="dash-card"><div class="dash-title">${I18n.t('dash_due')}</div><div class="dash-num" style="color:var(--danger)">${due}</div></div>
                        <div class="dash-card"><div class="dash-title">${I18n.t('dash_retained')}</div><div class="dash-num" style="color:var(--profit)">${retained}</div></div>
                        <div class="dash-card"><div class="dash-title">${I18n.t('dash_mastery')}</div><div class="dash-num" style="color:var(--primary)">${mastery.toFixed(1)}%</div></div>
                        <div class="dash-card"><div class="dash-title">${I18n.t('dash_execs')}</div><div class="dash-num">${Engine.stats.totalPlays}</div></div>
                        <div class="dash-card"><div class="dash-title">${I18n.t('dash_streak')}</div><div class="dash-num" style="color:var(--warning)">${Engine.stats.streak}</div></div>
                    </div>`;
                root.innerHTML = html;
            },

            renderUnitHub: function(root) {
                let stats = {};
                let toxicCount = 0;
                Engine.db.forEach(w => {
                    let cat = w.category || I18n.t('lbl_uncat');
                    if(!stats[cat]) stats[cat] = { total: 0, unlearned: 0, due: 0 };
                    stats[cat].total++;
                    if(!w.reviewCount || w.reviewCount === 0) stats[cat].unlearned++;
                    if(w.nextDate <= Date.now()) stats[cat].due++;
                    if(w.isToxic) toxicCount++;
                });

                let html = `<div class="unit-list">`;
                
                // ALL UNITS
                let allActive = this.activeFilter === 'ALL' ? 'is-active' : '';
                let allBtn = this.activeFilter === 'ALL' ? `<button class="sys-btn" style="padding:6px 15px;">TARGET LOCKED</button>` : `<button class="sys-btn" style="padding:6px 15px;" onclick="App.setFilter('ALL')">${I18n.t('lbl_all_units')}</button>`;
                html += `<div class="unit-row ${allActive}"><div class="unit-info"><h4>${I18n.t('lbl_all_units')} (Global Database)</h4><div class="unit-stats"><span>Total: ${Engine.db.length}</span></div></div><div>${allBtn}</div></div><hr style="width:100%; border:0; border-top:1px solid var(--border-color); margin: 10px 0;">`;

                // ☢️ TOXIC ASSETS ZONE
                if(toxicCount > 0) {
                    let toxActive = this.activeFilter === 'TOXIC' ? 'is-active' : '';
                    let toxBtn = this.activeFilter === 'TOXIC' ? `<button class="sys-btn" style="padding:6px 15px; border-color:var(--danger); color:var(--danger);">TARGET LOCKED</button>` : `<button class="sys-btn" style="padding:6px 15px; border-color:var(--danger); color:var(--danger);" onclick="App.setFilter('TOXIC')">PURGE TOXIC</button>`;
                    html += `<div class="unit-row status-toxic ${toxActive}"><div class="unit-info"><h4 style="color:var(--danger);">☢️ TOXIC ASSETS (隔離區)</h4><div class="unit-stats"><span style="color:var(--danger); font-weight:bold;">High Failure Rate Detected</span><span>Items: ${toxicCount}</span></div></div><div>${toxBtn}</div></div>`;
                }

                // NORMAL UNITS
                for(let cat in stats) {
                    let s = stats[cat];
                    let statusClass = "status-stable", badgeClass = "badge-stable", statusText = "STABLE";
                    if(s.unlearned === s.total) { statusClass = "status-new"; badgeClass = "badge-new"; statusText = "NEW"; }
                    else if(s.due > (s.total * 0.4)) { statusClass = "status-weak"; badgeClass = "badge-weak"; statusText = "WARNING"; }
                    let isActive = this.activeFilter === cat ? 'is-active' : '';
                    let actionBtn = this.activeFilter === cat ? `<button class="sys-btn" style="padding:6px 15px;" onclick="App.setFilter('ALL')">${I18n.t('btn_disengage')}</button>` : `<button class="sys-btn" style="padding:6px 15px;" onclick="App.setFilter('${cat}')">${I18n.t('btn_engage')}</button>`;
                    html += `<div class="unit-row ${statusClass} ${isActive}"><div class="unit-info"><h4>${cat}</h4><div class="unit-stats"><span class="unit-badge ${badgeClass}">${statusText}</span><span>Total: ${s.total}</span><span>Due: <b style="color:var(--danger)">${s.due}</b></span><span>Unlearned: ${s.unlearned}</span></div></div><div>${actionBtn}</div></div>`;
                }
                html += `</div>`; root.innerHTML = html;
            },
            
            next: function() { this.idx++; if(this.idx >= this.playQueue.length) { this.route('dashboard', document.querySelectorAll('.nav-item')[0]); } else { this.render(); } },
            checkQuiz: function(selectedWord, correctWord) {
                const isWin = selectedWord === correctWord;
                const btns = document.querySelectorAll('.quiz-opt-btn');
                btns.forEach(btn => {
                    btn.style.pointerEvents = 'none';
                    if(btn.innerText.includes(correctWord)) { btn.style.borderColor = 'var(--profit)'; btn.style.background = 'rgba(40, 167, 69, 0.1)'; }
                    else if(btn.innerText.includes(selectedWord) && !isWin) { btn.style.borderColor = 'var(--danger)'; btn.style.background = 'rgba(220, 53, 69, 0.1)'; }
                });
                Engine.recordTrade(isWin); Engine.processSRS(correctWord, isWin); setTimeout(() => this.next(), 1000); 
            },
            checkInput: function(ans, sent) {
                const val = document.getElementById('inp').value.trim().toLowerCase();
                let isWin = (this.mode === 'sentence') ? (val.replace(/[^a-z]/g,"") === sent.toLowerCase().replace(/[^a-z]/g,"")) : (val === ans.toLowerCase());
                const inp = document.getElementById('inp');
                inp.style.borderColor = isWin ? 'var(--profit)' : 'var(--danger)';
                inp.style.color = isWin ? 'var(--profit)' : 'var(--danger)';
                Engine.recordTrade(isWin); Engine.processSRS(ans, isWin); setTimeout(() => this.next(), 400);
            }
        };

        window.onload = () => App.init();
    </script>
</body>
</html>
