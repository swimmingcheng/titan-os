<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TITAN OS v46.1: ANALYTICS PLUS</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        /* =============================================================================
           CORE DESIGN SYSTEM: THEME ENGINE & PREMIUM TYPOGRAPHY
           ============================================================================= */
        :root {
            --bg-color: #ffffff; --card-bg: #ffffff; --sidebar-bg: #f8f9fa; --border-color: #dee2e6;
            --primary: #007bff; --secondary: #6f42c1; --danger: #dc3545; --profit: #28a745; --warning: #fd7e14;
            --text-main: #212529; --text-dim: #6c757d; --text-invert: #ffffff;
            --shadow: 0 8px 24px rgba(0,0,0,0.08);
            --font-en: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            --font-cn: "Microsoft JhengHei", "Noto Sans TC", sans-serif;
        }
        [data-theme="dark"] {
            --bg-color: #0d1117; --card-bg: #161b22; --sidebar-bg: #010409; --border-color: #30363d;
            --primary: #58a6ff; --profit: #3fb950; --danger: #f85149; --warning: #d29922;
            --text-main: #c9d1d9; --text-dim: #8b949e; --text-invert: #0d1117;
            --shadow: 0 15px 40px rgba(0,0,0,0.6);
        }

        * { box-sizing: border-box; user-select: none; outline: none; transition: background-color 0.3s, border-color 0.3s, color 0.3s; }
        body { margin: 0; width: 100vw; height: 100vh; background-color: var(--bg-color); color: var(--text-main); font-family: var(--font-en); overflow: hidden; display: flex; flex-direction: column; }

        header { height: 70px; flex-shrink: 0; z-index: 100; background: var(--bg-color); border-bottom: 1px solid var(--border-color); display: flex; justify-content: space-between; align-items: center; padding: 0 35px; }
        .brand { font-size: 1.4rem; font-weight: 800; letter-spacing: 1px; display: flex; align-items: center; gap: 15px; }
        .brand span { font-weight: 400; color: var(--text-dim); }
        .toggles { display: flex; gap: 10px; }
        .btn-toggle { background: transparent; border: 1px solid var(--border-color); color: var(--text-main); padding: 5px 10px; border-radius: 6px; cursor: pointer; font-weight: bold; font-family: Consolas, monospace; }
        .btn-toggle:hover { background: var(--border-color); }
        .header-right { display: flex; gap: 25px; align-items: center; font-family: Consolas, monospace; }
        .metric { display: flex; flex-direction: column; align-items: flex-end; }
        .metric-label { font-size: 0.7rem; color: var(--text-dim); letter-spacing: 1px; }
        .metric-val { font-size: 1.2rem; font-weight: 700; color: var(--text-main); }
        .val-profit { color: var(--profit); }

        #workspace { flex: 1; display: flex; overflow: hidden; }
        
        /* 側邊欄與滾輪優化 */
        .sidebar { width: 260px; background: var(--sidebar-bg); border-right: 1px solid var(--border-color); display: flex; flex-direction: column; padding: 20px 10px; gap: 4px; overflow-y: auto; }
        .sidebar::-webkit-scrollbar, .stage::-webkit-scrollbar { width: 6px; }
        .sidebar::-webkit-scrollbar-thumb, .stage::-webkit-scrollbar-thumb { background: var(--border-color); border-radius: 10px; }
        .sidebar::-webkit-scrollbar-track { background: transparent; }

        .nav-label { font-size: 0.75rem; color: var(--text-dim); margin-top: 20px; margin-bottom: 8px; padding-left: 15px; font-weight: bold; letter-spacing: 1px; }
        .nav-item { padding: 12px 15px; cursor: pointer; border-radius: 6px; color: var(--text-dim); font-weight: 600; display: flex; align-items: center; gap: 12px; font-size: 0.95rem; font-family: Consolas, monospace; }
        .nav-item:hover { background: var(--border-color); color: var(--text-main); }
        .nav-item.active { background-color: var(--card-bg); color: var(--primary); border: 1px solid var(--border-color); box-shadow: var(--shadow); }
        .nav-item span { font-family: var(--font-en); }
        .active-unit-indicator { font-size: 0.7rem; color: var(--profit); margin-left: 15px; font-weight: bold; letter-spacing: 1px; margin-top: -5px; margin-bottom: 10px; }

        .stage { flex: 1; height: 100%; overflow-y: auto; display: flex; flex-direction: column; align-items: center; padding: 40px; padding-bottom: 200px; }

        /* DASHBOARD & ANALYTICS UI */
        .dash-grid { width: 100%; max-width: 900px; display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 30px; }
        .dash-card { background: var(--card-bg); border: 1px solid var(--border-color); padding: 25px; border-radius: 12px; text-align: center; box-shadow: var(--shadow); }
        .dash-title { font-size: 0.85rem; color: var(--text-dim); margin-bottom: 8px; font-weight: bold; text-transform: uppercase; }
        .dash-num { font-size: 2.5rem; font-family: Consolas, monospace; color: var(--text-main); font-weight: 700; }
        
        .heatmap-container { width: 100%; max-width: 900px; background: var(--card-bg); border: 1px solid var(--border-color); border-radius: 12px; padding: 25px; box-shadow: var(--shadow); margin-bottom: 30px; }
        .heatmap-grid { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 15px; }
        .heatmap-cell { width: 14px; height: 14px; border-radius: 2px; background: var(--border-color); position: relative; cursor: help; }
        .heatmap-cell:hover::after { content: attr(data-date); position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); background: #000; color: #fff; padding: 2px 6px; border-radius: 4px; font-size: 0.6rem; z-index: 10; white-space: nowrap; }
        .lvl-1 { background: rgba(40, 167, 69, 0.25); }
        .lvl-2 { background: rgba(40, 167, 69, 0.5); }
        .lvl-3 { background: rgba(40, 167, 69, 0.75); }
        .lvl-4 { background: rgba(40, 167, 69, 1.0); }

        .report-section { width: 100%; max-width: 900px; display: grid; grid-template-columns: 1.2fr 1fr; gap: 20px; margin-bottom: 30px; }
        .report-card { background: var(--card-bg); border: 1px solid var(--border-color); border-radius: 12px; padding: 20px; box-shadow: var(--shadow); }
        .toxic-item { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid var(--border-color); font-family: Consolas, monospace; align-items: center; }
        .toxic-item:last-child { border: none; }
        .toxic-item b { color: var(--danger); font-size: 1.1rem; }

        .config-bar { width: 100%; max-width: 900px; display: flex; justify-content: space-between; margin-bottom: 30px; }
        .btn-action { padding: 10px 20px; background: var(--card-bg); border: 1px solid var(--border-color); color: var(--text-main); border-radius: 6px; cursor: pointer; font-weight: bold; display: flex; align-items: center; gap: 8px; }
        .btn-action:hover { border-color: var(--primary); color: var(--primary); }
        
        /* UNIT HUB UI */
        .unit-list { width: 100%; max-width: 900px; display: flex; flex-direction: column; gap: 15px; }
        .unit-row { background: var(--card-bg); border: 1px solid var(--border-color); border-radius: 12px; padding: 20px 25px; display: flex; justify-content: space-between; align-items: center; box-shadow: var(--shadow); border-left: 6px solid var(--primary); }
        .unit-row.status-new { border-left-color: var(--primary); }
        .unit-row.status-weak { border-left-color: var(--danger); }
        .unit-row.status-stable { border-left-color: var(--profit); }
        .unit-row.status-toxic { border-left-color: var(--danger); background: rgba(220,53,69,0.05); }
        .unit-row.is-active { border: 2px solid var(--primary); border-left: 6px solid var(--primary); background: var(--sidebar-bg); }
        .unit-info h4 { margin: 0 0 8px 0; color: var(--text-main); font-size: 1.2rem; font-family: var(--font-en); }
        .unit-stats { font-size: 0.85rem; color: var(--text-dim); font-family: Consolas, monospace; display: flex; gap: 15px; }
        .unit-badge { font-weight: bold; padding: 4px 10px; border-radius: 6px; font-size: 0.8rem; letter-spacing: 1px; }
        .badge-new { background: rgba(0,123,255,0.1); color: var(--primary); }
        .badge-weak { background: rgba(220,53,69,0.1); color: var(--danger); }
        .badge-stable { background: rgba(40,167,69,0.1); color: var(--profit); }

        /* RADAR CHART UI */
        .chart-container { width: 100%; max-width: 900px; background: var(--card-bg); border: 1px solid var(--border-color); border-radius: 12px; padding: 30px; box-shadow: var(--shadow); margin-bottom: 30px; }
        .chart-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border-color); padding-bottom: 15px; margin-bottom: 20px; }
        .unit-select { padding: 8px 15px; font-size: 1rem; border-radius: 6px; border: 1px solid var(--border-color); background: var(--sidebar-bg); color: var(--text-main); outline: none; cursor: pointer; }
        .unit-info-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; margin-bottom: 20px; }
        .info-box { background: var(--sidebar-bg); padding: 15px; border-radius: 8px; border: 1px solid var(--border-color); text-align: center; }
        .info-label { font-size: 0.75rem; color: var(--text-dim); margin-bottom: 5px; font-weight: bold; }
        .info-val { font-size: 1.2rem; font-weight: bold; font-family: Consolas, monospace; color: var(--primary); }
        .slider-wrapper { margin-top: 25px; display: flex; flex-direction: column; gap: 10px; }
        .slider-label { font-family: Consolas, monospace; font-size: 1.1rem; font-weight: bold; color: var(--warning); display: flex; justify-content: space-between; }
        input[type=range] { width: 100%; cursor: pointer; accent-color: var(--warning); }

        /* STUDY CARDS UI */
        .study-card { 
            width: 100%; max-width: 800px; min-height: 480px; height: auto; 
            background: var(--card-bg); border: 1px solid var(--border-color); 
            box-shadow: var(--shadow); border-radius: 16px; 
            padding: 50px; display: flex; flex-direction: column; align-items: center; justify-content: center;
            position: relative; gap: 15px; 
        }
        .word-unit { font-size: 0.85rem; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1px; border: 1px solid var(--border-color); padding: 4px 10px; border-radius: 12px; }
        
        .word-en { font-size: 4rem; font-weight: 800; color: var(--text-main); margin: 0; letter-spacing: -1px; text-align: center; cursor: pointer; position: relative; }
        .word-en:hover { color: var(--primary); }
        .word-en:hover::after { content: '🔊'; font-size: 1.5rem; position: absolute; top: -10px; right: -30px; }

        /* 🔊 美化過的喇叭播放按鈕 (TITAN OS Style) */
        .vox-trigger {
            width: 120px; height: 120px; border-radius: 50%; 
            border: 2px solid var(--primary); background: transparent;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; position: relative; transition: 0.2s; margin-bottom: 20px;
        }
        .vox-trigger::before { content: ""; position: absolute; width: 100%; height: 100%; border-radius: 50%; border: 1px solid var(--primary); animation: vox-pulse 2s infinite; opacity: 0.5; }
        .vox-trigger:active { transform: scale(0.9); }
        .vox-trigger svg { width: 50px; height: 50px; fill: var(--primary); }
        @keyframes vox-pulse { 0% { transform: scale(1); opacity: 0.5; } 100% { transform: scale(1.5); opacity: 0; } }

        .ipa-txt { color: var(--text-dim); font-size: 1.3rem; font-family: Consolas, monospace; }

        .prompt-box {
            width: 100%; background: var(--sidebar-bg); padding: 35px 25px 25px 25px; 
            border-radius: 12px; border-left: 5px solid var(--primary); 
            position: relative; margin-top: 10px; overflow: hidden;
            display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; 
        }
        .timer-line { height: 4px; background: var(--primary); width: 100%; position: absolute; top: 0; left: 0; animation: countdown 5s linear forwards; }
        @keyframes countdown { 0% { width: 100%; background: var(--primary); } 70% { background: var(--warning); } 100% { width: 0%; background: var(--danger); } }

        .prompt-content { font-size: 1.6rem; font-style: italic; color: var(--text-main); line-height: 1.6; font-family: var(--font-en); font-weight: 500; width: 100%; text-align: center; }
        .prompt-cn { font-size: 1.8rem; font-weight: bold; color: var(--text-main); font-family: var(--font-cn); font-style: normal; width: 100%; text-align: center; letter-spacing: 1px; }
        .toggle-lang-btn { position: absolute; top: 10px; right: 10px; background: var(--card-bg); border: 1px solid var(--border-color); color: var(--text-dim); padding: 4px 10px; border-radius: 6px; cursor: pointer; font-size: 0.8rem; font-weight: bold; box-shadow: 0 2px 5px rgba(0,0,0,0.05); z-index: 10; }
        .toggle-lang-btn:hover { background: var(--primary); color: #fff; border-color: var(--primary); }

        .input-bar { 
            width: 100%; padding: 20px; background: var(--bg-color); border: 2px solid var(--border-color); 
            color: var(--text-main); font-size: 2.2rem; font-weight: 300; text-align: center; 
            border-radius: 12px; font-family: var(--font-en); letter-spacing: 2px;
        }
        .input-bar::placeholder { color: var(--text-dim); font-size: 1.2rem; font-weight: 400; letter-spacing: 0; }
        .input-bar:focus { border-color: var(--primary); box-shadow: 0 0 20px rgba(0, 123, 255, 0.15); }

        .sys-btn { padding: 12px 30px; font-size: 0.95rem; font-weight: bold; color: var(--primary); background: transparent; border: 2px solid var(--primary); border-radius: 6px; cursor: pointer; text-transform: uppercase; letter-spacing: 1px; }
        .sys-btn:hover { background: var(--primary); color: var(--text-invert); }
        
        .quiz-header { width: 100%; display: flex; justify-content: space-between; color: var(--text-dim); font-weight: bold; border-bottom: 1px solid var(--border-color); padding-bottom: 10px; }
        .quiz-question { font-size: 1.4rem; width: 100%; text-align: center; line-height: 1.5; font-family: var(--font-en); font-weight: 600; }
        .quiz-options { width: 100%; display: flex; flex-direction: column; gap: 12px; }
        .quiz-opt-btn { width: 100%; text-align: left; padding: 16px 20px; font-size: 1.2rem; background: var(--card-bg); border: 1px solid var(--border-color); color: var(--text-main); border-radius: 10px; cursor: pointer; display: flex; align-items: center; gap: 15px; }
        .quiz-opt-btn:hover { border-color: var(--primary); background: var(--sidebar-bg); }
        .opt-label { font-weight: bold; color: var(--text-dim); border: 1px solid var(--border-color); border-radius: 50%; width: 30px; height: 30px; display: flex; align-items: center; justify-content: center; font-size: 1rem; flex-shrink: 0; }

        .hidden { display: none !important; }
    </style>
</head>
<body>

    <header>
        <div class="brand">
            OMNI-CORE <span>v46.1 ANALYTICS PLUS</span>
            <div class="toggles">
                <button class="btn-toggle" onclick="Theme.toggle()">🌓</button>
                <button class="btn-toggle" onclick="I18n.toggle()" id="lang-btn">EN/中</button>
            </div>
        </div>
        <div class="header-right">
            <div class="metric">
                <span class="metric-label" data-i18n="hdr_winrate">WIN RATE</span>
                <span class="metric-val" id="winrate-val">0%</span>
            </div>
            <div class="metric">
                <span class="metric-label" data-i18n="hdr_capital">CAPITAL</span>
                <span class="metric-val val-profit" id="capital-val">$10,000.00</span>
            </div>
        </div>
    </header>

    <div id="workspace">
        <nav class="sidebar">
            <div class="nav-label" data-i18n="nav_grp_sys">SYSTEM</div>
            <div class="nav-item active" onclick="App.route('dashboard', this)">// <span data-i18n="nav_dash">DASHBOARD</span></div>
            <div class="nav-item" onclick="App.route('units', this)">// <span data-i18n="nav_units">UNIT HUB</span></div>
            <div class="nav-item" onclick="App.route('analytics', this)">// <span data-i18n="nav_radar">MNEMONIC RADAR</span></div>
            <div class="active-unit-indicator" id="target-indicator">TARGET: ALL UNITS</div>
            
            <div class="nav-label" data-i18n="nav_grp_rev">REVIEW ZONE</div>
            <div class="nav-item" onclick="App.route('quiz', this)" style="color:var(--primary);">// <span data-i18n="nav_quiz">DAILY CALIBRATE</span></div>
            <div class="nav-item" onclick="App.route('flashcard', this)">// <span data-i18n="nav_flash">SRS FLASHCARD</span></div>
            
            <div class="nav-label" data-i18n="nav_grp_prac">PRACTICE ZONE</div>
            <div class="nav-item" onclick="App.route('ch_to_en', this)">// <span data-i18n="nav_spell">SPELLING DECODER</span></div>
            <div class="nav-item" onclick="App.route('dictation', this)" style="color:var(--warning);">// <span data-i18n="nav_dict">VOX DICTATION</span></div>
            <div class="nav-item" onclick="App.route('fill', this)">// <span data-i18n="nav_fill">MARGIN PATCH</span></div>
            <div class="nav-item" onclick="App.route('sentence', this)">// <span data-i18n="nav_syntax">SYNTAX FORGE</span></div>
        </nav>

        <section class="stage" id="root-view"></section>
    </div>

    <input type="file" id="file-importer" accept=".json" class="hidden" onchange="Engine.importJSON(event)">

    <script>
        const I18n = {
            lang: 'en',
            dict: {
                en: {
                    hdr_winrate: "WIN RATE", hdr_capital: "CAPITAL",
                    nav_grp_sys: "SYSTEM", nav_dash: "DASHBOARD", nav_units: "UNIT HUB", nav_radar: "MNEMONIC RADAR",
                    nav_grp_rev: "REVIEW ZONE", nav_quiz: "DAILY CALIBRATE", nav_flash: "SRS FLASHCARD",
                    nav_grp_prac: "PRACTICE ZONE", nav_spell: "SPELLING DECODER", nav_fill: "MARGIN PATCH", nav_syntax: "SYNTAX FORGE", nav_dict: "VOX DICTATION",
                    btn_import: "📥 IMPORT JSON", btn_export: "💾 EXPORT BACKUP", btn_purge: "🗑️ PURGE DATA",
                    dash_total: "TOTAL WORDS", dash_due: "DUE TODAY", dash_retained: "RETAINED",
                    dash_mastery: "MASTERY %", dash_execs: "TOTAL EXECUTIONS", dash_streak: "CURRENT STREAK",
                    dash_heatmap: "ACTIVITY HEATMAP (60D)", dash_toxic_top: "TOP TOXIC ASSETS",
                    chart_title: "Precognition Model", chart_desc: "Simulates memory retention decay.",
                    info_date: "Date Added", info_revs: "Avg Reviews", info_days: "Days Elapsed", info_ret: "Current Retention",
                    msg_dictation: "DICTATION MODE ACTIVE", ph_dictation: "Type what you hear...",
                    btn_reveal: "REVEAL", btn_forgot: "FORGOT", btn_remember: "REMEMBERED", btn_execute: "EXECUTE",
                    ph_spell: "Input English...", ph_fill: "Fill missing data...", ph_syntax: "Re-type Syntax...",
                    msg_all_clear: "TASK COMPLETE", msg_no_need: "No due words in target unit.",
                    lbl_question: "Question", lbl_uncat: "Uncategorized",
                    lbl_all_units: "ALL UNITS", btn_engage: "ENGAGE", btn_disengage: "DISENGAGE",
                    status_new: "NEW", status_weak: "WARNING", status_stable: "STABLE"
                },
                zh: {
                    hdr_winrate: "當前勝率", hdr_capital: "可用資金",
                    nav_grp_sys: "系統 (SYSTEM)", nav_dash: "統計儀表板", nav_units: "單元中樞", nav_radar: "記憶雷達",
                    nav_grp_rev: "複習區 (REVIEW ZONE)", nav_quiz: "每日校準測驗", nav_flash: "間隔記憶字卡",
                    nav_grp_prac: "練習區 (PRACTICE ZONE)", nav_spell: "拼寫解碼", nav_fill: "克漏字填空", nav_syntax: "語法鍛造", nav_dict: "聽音聽寫",
                    btn_import: "📥 匯入 JSON", btn_export: "💾 匯出備份 (BACKUP)", btn_purge: "🗑️ 清空所有資料",
                    dash_total: "總學習字數", dash_due: "今日待複習", dash_retained: "已保留記憶",
                    dash_mastery: "整體掌握度", dash_execs: "總交易次數", dash_streak: "連續獲利",
                    dash_heatmap: "學習活躍度熱點圖 (60天)", dash_toxic_top: "五大毒性資產 (常錯單字)",
                    chart_title: "預知演算模型 (Forgetting Curve)", chart_desc: "模擬記憶強度的漸近衰退行為。",
                    info_date: "起始日期", info_revs: "平均複習次數", info_days: "目前經過天數", info_ret: "當前掌握度",
                    msg_dictation: "聽寫模式已啟動", ph_dictation: "輸入聽到的單字...",
                    btn_reveal: "顯示答案", btn_forgot: "忘記了", btn_remember: "記得了", btn_execute: "執行送出",
                    ph_spell: "輸入對應的英文單字...", ph_fill: "填入句子中遺失的單字...", ph_syntax: "重新輸入整句文法...",
                    msg_all_clear: "任務完成", msg_no_need: "目標單元目前無須複習。",
                    lbl_question: "題目", lbl_uncat: "未分類單元",
                    lbl_all_units: "全庫測驗", btn_engage: "鎖定目標", btn_disengage: "解除鎖定",
                    status_new: "未學習", status_weak: "需加強", status_stable: "穩定"
                }
            },
            init: function() { this.lang = localStorage.getItem('titan_lang') || 'en'; this.apply(); },
            toggle: function() {
                this.lang = this.lang === 'en' ? 'zh' : 'en'; localStorage.setItem('titan_lang', this.lang); this.apply(); App.render();
                if(App.mode === 'analytics' && ChartEngine.chartInstance) ChartEngine.renderChartUI(document.getElementById('root-view'));
            },
            t: function(key) { return this.dict[this.lang][key] || key; },
            apply: function() { document.querySelectorAll('[data-i18n]').forEach(el => { const key = el.getAttribute('data-i18n'); if(this.dict[this.lang][key]) el.innerHTML = this.dict[this.lang][key]; }); }
        };

        const Theme = {
            init: function() { const saved = localStorage.getItem('titan_theme') || 'dark'; document.documentElement.setAttribute('data-theme', saved); },
            toggle: function() {
                const current = document.documentElement.getAttribute('data-theme');
                const next = current === 'dark' ? 'light' : 'dark';
                document.documentElement.setAttribute('data-theme', next); localStorage.setItem('titan_theme', next);
                if(App.mode === 'analytics' && ChartEngine.chartInstance) ChartEngine.updateColors();
            }
        };
        
        const Engine = {
            db: [], capital: 0, stats: {}, dailyLogs: {},
            init: function() {
                this.db = JSON.parse(localStorage.getItem('titan_v46_db')) || JSON.parse(localStorage.getItem('titan_v45_db')) || [];
                const now = Date.now();
                this.db.forEach(w => { 
                    if(!w.dateAdded) w.dateAdded = now; 
                    if(!w.failCount) w.failCount = 0; 
                    if(!w.lastReviewDate) w.lastReviewDate = now;
                });
                this.capital = parseFloat(localStorage.getItem('titan_v46_cap')) || 10000.00;
                this.stats = JSON.parse(localStorage.getItem('titan_v46_stats')) || { totalPlays: 0, wins: 0, streak: 0 };
                this.dailyLogs = JSON.parse(localStorage.getItem('titan_v46_logs')) || {};
                this.updateHeader();
            },
            saveAll: function() {
                localStorage.setItem('titan_v46_db', JSON.stringify(this.db));
                localStorage.setItem('titan_v46_cap', this.capital.toFixed(2));
                localStorage.setItem('titan_v46_stats', JSON.stringify(this.stats));
                localStorage.setItem('titan_v46_logs', JSON.stringify(this.dailyLogs));
            },
            recordTrade: function(isWin) {
                this.stats.totalPlays++;
                const today = new Date().toISOString().split('T')[0];
                this.dailyLogs[today] = (this.dailyLogs[today] || 0) + 1;
                if(isWin) { this.stats.wins++; this.stats.streak++; this.capital += (50 + this.stats.streak * 5); } 
                else { this.stats.streak = 0; this.capital -= 150; }
                this.saveAll(); this.updateHeader();
            },
            updateHeader: function() {
                document.getElementById('capital-val').innerText = `$${this.capital.toFixed(2)}`;
                let rate = this.stats.totalPlays === 0 ? 0 : (this.stats.wins / this.stats.totalPlays) * 100;
                document.getElementById('winrate-val').innerText = `${rate.toFixed(1)}%`;
            },
            processSRS: function(wordStr, isWin) {
                let item = this.db.find(x => x.w === wordStr);
                if(!item) return;
                item.lastReviewDate = Date.now();
                if(isWin) {
                    item.reviewCount = (item.reviewCount || 0) + 1;
                    if(item.interval === 0) item.interval = 1; else if(item.interval === 1) item.interval = 3; else item.interval = Math.round(item.interval * (item.ease || 2.5));
                    item.ease = Math.min(3.0, (item.ease || 2.5) + 0.1);
                    item.failCount = Math.max(0, (item.failCount || 0) - 1);
                } else {
                    item.interval = 0; item.ease = Math.max(1.3, (item.ease || 2.5) - 0.2); 
                    item.reviewCount = Math.max(0, (item.reviewCount || 0) - 1);
                    item.failCount = (item.failCount || 0) + 1;
                }
                item.isToxic = item.failCount >= 3;
                item.nextDate = Date.now() + (item.interval * 86400000);
                this.saveAll();
            },
            getDueWords: function(unitFilter = 'ALL') { 
                const now = Date.now(); 
                if(unitFilter === 'TOXIC') return this.db.filter(w => w.isToxic && w.nextDate <= now);
                let source = this.db;
                if(unitFilter !== 'ALL') source = source.filter(w => (w.category || I18n.t('lbl_uncat')) === unitFilter);
                return source.filter(x => x.nextDate <= now); 
            },
            triggerImport: function() { document.getElementById('file-importer').click(); },
            exportBackup: function() {
                const payload = { titan_version: "46.1", timestamp: Date.now(), db: this.db, capital: this.capital, stats: this.stats, logs: this.dailyLogs };
                const blob = new Blob([JSON.stringify(payload, null, 2)], {type: "application/json"});
                const a = document.createElement("a"); a.href = URL.createObjectURL(blob);
                a.download = `TITAN_BACKUP_V46_${new Date().toISOString().slice(0,10)}.json`; a.click();
            },
            importJSON: function(event) {
                const file = event.target.files[0]; if(!file) return;
                const reader = new FileReader();
                reader.onload = (e) => {
                    try {
                        const importedData = JSON.parse(e.target.result);
                        if(importedData.db) {
                            this.db = importedData.db; this.capital = importedData.capital || 10000; this.stats = importedData.stats || { totalPlays: 0, wins: 0, streak: 0 }; this.dailyLogs = importedData.logs || {};
                            this.saveAll(); this.updateHeader(); alert("Restore Successful!");
                            App.route('dashboard', document.querySelector('.nav-item')); return;
                        }
                        let parsedDB = []; const now = Date.now();
                        for (let categoryName in importedData) {
                            importedData[categoryName].forEach(wordObj => {
                                parsedDB.push({ ...wordObj, category: categoryName, interval: 0, ease: 2.5, reviewCount: 0, failCount: 0, isToxic: false, nextDate: now, dateAdded: now, lastReviewDate: now });
                            });
                        }
                        this.db = this.db.concat(parsedDB).filter((v,i,a)=>a.findIndex(t=>(t.w === v.w))===i);
                        this.saveAll(); alert(`Imported ${parsedDB.length} items!`); App.route('units', document.querySelectorAll('.nav-item')[1]);
                    } catch (err) { alert("JSON format error."); }
                };
                reader.readAsText(file); event.target.value = '';
            },
            purgeDatabase: function() { if(confirm("Purge all data?")) { this.db = []; this.dailyLogs = {}; this.saveAll(); App.route('dashboard', document.querySelector('.nav-item')); } }
        };

        const ChartEngine = {
            chartInstance: null, sliderValue: 0, activeUnit: null,
            renderChartUI: function(root) {

                if(categories.length === 0) opts = `<option value="">No Data</option>`;
                root.innerHTML = `
                    <div class="chart-container">
                        <div class="chart-header">
                            <div><h3 style="margin:0; color:var(--primary);">${I18n.t('chart_title')}</h3><div style="font-size:0.85rem; color:var(--text-dim); margin-top:5px;">${I18n.t('chart_desc')}</div></div>

                            <div class="info-box"><div class="info-label">${I18n.t('info_days')}</div><div class="info-val" id="info-days">--</div></div>
                            <div class="info-box"><div class="info-label">${I18n.t('info_ret')}</div><div class="info-val" id="info-retention" style="color:var(--profit);">--%</div></div>

                        <canvas id="memoryChart" height="110"></canvas>

                            <input type="range" id="time-slider" min="0" max="30" step="1" value="0" oninput="ChartEngine.onSliderChange(event)">
                        </div>
                    </div>`;
                setTimeout(() => { this.activeUnit = document.getElementById('unit-selector').value; this.initChart(); this.updateUnitData(); }, 50);
            },
            changeUnit: function() { this.activeUnit = document.getElementById('unit-selector').value; this.updateUnitData(); },
            onSliderChange: function(e) { this.sliderValue = parseInt(e.target.value); document.getElementById('time-label').innerText = `T+ ${this.sliderValue} Days`; this.updateChartData(); },
            updateUnitData: function() {
                if(!this.activeUnit) return;
                let words = Engine.db.filter(w => (w.category || I18n.t('lbl_uncat')) === this.activeUnit);
                if(words.length === 0) return;
                let avgReview = words.reduce((acc, w) => acc + (w.reviewCount || 0), 0) / words.length;
                let earliestStart = Math.min(...words.map(w => w.dateAdded || Date.now()));
                let actualDays = Math.max(0, Math.floor((Date.now() - earliestStart) / 86400000));
                let d = new Date(earliestStart);
                document.getElementById('info-date').innerText = `${d.getFullYear()}/${d.getMonth()+1}/${d.getDate()}`;
                document.getElementById('info-reviews').innerText = avgReview.toFixed(1);
                document.getElementById('info-days').innerText = `${actualDays}`;
                this.sliderValue = actualDays > 30 ? 30 : actualDays;
                document.getElementById('time-slider').value = this.sliderValue;
                document.getElementById('time-label').innerText = `T+ ${this.sliderValue} Days (Current)`;
                this.currentAvgReview = avgReview; this.updateChartData();
            },
            initChart: function() {
                const ctx = document.getElementById('memoryChart').getContext('2d');
                const textColor = getComputedStyle(document.documentElement).getPropertyValue('--text-main').trim();
                const gridColor = getComputedStyle(document.documentElement).getPropertyValue('--border-color').trim();
                if(this.chartInstance) this.chartInstance.destroy();
                this.chartInstance = new Chart(ctx, {
                    type: 'line', data: { labels: [], datasets: [] },
                    options: {
                        responsive: true, animation: { duration: 300 },
                        scales: { y: { min: 0, max: 100, grid: {color: gridColor}, ticks: {color: textColor} }, x: { grid: {color: gridColor}, ticks: {color: textColor} } },
                        plugins: { legend: { labels: { color: textColor } } }
                    }
                });
            },
            updateChartData: function() {
                if(!this.chartInstance) return;
                const strengths = [1.5, 4.0, 12.0, 35.0];
                let curveIndex = Math.min(3, Math.round(this.currentAvgReview || 0));
                let S_current = strengths[curveIndex]; 
                let S_next = strengths[Math.min(3, curveIndex + 1)];
                let days = Array.from({length: 31}, (_, i) => i);
                let curveCurrent = days.map(t => 100 * Math.exp(-t / S_current));
                let curveProjected = days.map(t => (t < this.sliderValue) ? null : (t === this.sliderValue ? 100 : 100 * Math.exp(-(t - this.sliderValue) / S_next)));
                document.getElementById('info-retention').innerText = `${curveCurrent[this.sliderValue].toFixed(1)}%`;
                document.getElementById('info-retention').style.color = curveCurrent[this.sliderValue] < 50 ? 'var(--danger)' : 'var(--profit)';
                this.chartInstance.data = {
                    labels: days,
                    datasets: [
                        { label: `Current Decay`, data: curveCurrent, borderColor: '#fd7e14', borderWidth: 2, pointRadius: 0 },
                        { label: `Projected`, data: curveProjected, borderColor: '#28a745', borderDash: [5,5], borderWidth: 2, pointRadius: 0 },
                        { label: 'Coordinate', data: days.map(t => t === this.sliderValue ? curveCurrent[t] : null), backgroundColor: '#007bff', pointRadius: 8 }
                    ]
                };
                this.chartInstance.update();
            },
            updateColors: function() {
                if(!this.chartInstance) return;
                const textColor = getComputedStyle(document.documentElement).getPropertyValue('--text-main').trim();
                const gridColor = getComputedStyle(document.documentElement).getPropertyValue('--border-color').trim();
                this.chartInstance.options.scales.x.ticks.color = textColor; this.chartInstance.options.scales.x.grid.color = gridColor;
                this.chartInstance.options.scales.y.ticks.color = textColor; this.chartInstance.options.scales.y.grid.color = gridColor;
                this.chartInstance.options.plugins.legend.labels.color = textColor; this.chartInstance.update();
            }
        };

            renderUnitHub: function(root) {
                let stats = {}; let toxicCount = 0;
                Engine.db.forEach(w => {
                    let cat = w.category || I18n.t('lbl_uncat');
                    if(!stats[cat]) stats[cat] = { total: 0, unlearned: 0, due: 0 };
                    stats[cat].total++;
                    if(!w.reviewCount || w.reviewCount === 0) stats[cat].unlearned++;
                    if(w.nextDate <= Date.now()) stats[cat].due++;
                    if(w.isToxic) toxicCount++;
                });
                let html = `<div class="unit-list">`;
                html += `<div class="unit-row ${this.activeFilter === 'ALL' ? 'is-active' : ''}"><div class="unit-info"><h4>${I18n.t('lbl_all_units')} (GLOBAL)</h4><div class="unit-stats"><span>Total: ${Engine.db.length}</span></div></div><div><button class="sys-btn" onclick="App.setFilter('ALL')">SELECT</button></div></div>`;
                if(toxicCount > 0) {
                    html += `<div class="unit-row status-toxic ${this.activeFilter === 'TOXIC' ? 'is-active' : ''}"><div class="unit-info"><h4 style="color:var(--danger);">☢️ TOXIC ASSETS</h4><div class="unit-stats"><span>隔離區單字: ${toxicCount}</span></div></div><div><button class="sys-btn" style="border-color:var(--danger); color:var(--danger);" onclick="App.setFilter('TOXIC')">PURGE</button></div></div>`;
                }
                for(let cat in stats) {
                    let s = stats[cat]; let statusClass = s.unlearned === s.total ? "status-new" : (s.due > (s.total * 0.4) ? "status-weak" : "status-stable");
                    html += `<div class="unit-row ${statusClass} ${this.activeFilter === cat ? 'is-active' : ''}"><div class="unit-info"><h4>${cat}</h4><div class="unit-stats"><span class="unit-badge badge-${statusClass.split('-')[1]}">${I18n.t(statusClass.replace('-','_'))}</span><span>Total: ${s.total}</span><span>Due: <b style="color:var(--danger)">${s.due}</b></span></div></div><div><button class="sys-btn" onclick="App.setFilter('${cat}')">ENGAGE</button></div></div>`;
                }
                root.innerHTML = html + `</div>`;
            },
            
            next: function() { this.idx++; if(this.idx >= this.playQueue.length) { this.route('dashboard', document.querySelectorAll('.nav-item')[0]); } else { this.render(); } },
            checkQuiz: function(sel, cor) {
                const isWin = sel === cor;
                document.querySelectorAll('.quiz-opt-btn').forEach(b => { b.style.pointerEvents = 'none'; if(b.innerText.includes(cor)) b.style.borderColor = 'var(--profit)'; else if(b.innerText.includes(sel) && !isWin) b.style.borderColor = 'var(--danger)'; });
                Engine.recordTrade(isWin); Engine.processSRS(cor, isWin); setTimeout(() => this.next(), 1000); 
            },
            checkTrade: function(isWin, word) { Engine.recordTrade(isWin); Engine.processSRS(word, isWin); this.next(); },
            checkInput: function(ans, sent) {
                let val = document.getElementById('inp') ? document.getElementById('inp').value.trim().toLowerCase() : ans.toLowerCase();
                let isWin = (this.mode === 'sentence') ? (val.replace(/[^a-z]/g,"") === sent.toLowerCase().replace(/[^a-z]/g,"")) : (val === ans.toLowerCase());
                if(document.getElementById('inp')) { document.getElementById('inp').style.borderColor = isWin ? 'var(--profit)' : 'var(--danger)'; document.getElementById('inp').style.color = isWin ? 'var(--profit)' : 'var(--danger)'; }
                Engine.recordTrade(isWin); Engine.processSRS(ans, isWin); setTimeout(() => this.next(), 400);
            }
        };
        window.onload = () => App.init();
    </script>
</body>
</html>
